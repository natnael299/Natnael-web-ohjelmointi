      <h3>Muuttujia ja tietotyyppejä</h3>
      <input type="text" class="num1" placeholder="kirjoitta numero" />

    </section>
    <section class="Mehdi">
      <h2>Mehdi</h2>
      <ul class="mehdiL"></ul>
    </section>
    <section class="Tuuli">
      <h2>Tuuli</h2>
      <ul class="tuuliL"></ul>

    <h4>Js Sets union, symmetric Difference, intersection</h4>
    <ul class="veijotuuli"></ul>
