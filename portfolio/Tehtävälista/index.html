<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
    <style>
      .outerContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid black;
        padding: 20px;
        border-radius: 10px;
        width: fit-content;
        gap: 10px;
        margin: 100px auto;
      }

      .outerContainer input {
        height: 30px;
        width: 300px;
      }
      .outerContainer button {
        height: 30px;
        width: 310px;
        border-radius: 10px;
        background-color: red;
        color: white;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="outerContainer">
      <h1>Tehtävä Lista</h1>
      <input type="text" class="text" placeholder="Syötä joku teksti" />
      <input type="number" class="num" placeholder="syötä numero esim. 12" />
      <button class="addBtn">Lisää</button>
      <ul class="container">
        <li>Tehtävä 2</li>
      </ul>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
