<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Henkilötiedot</h1>
    <table>
      <thead>
        <tr>
          <th>Nimi</th>
          <th>Ikä</th>
          <th>Työ</th>
          <th>Ajokortti</th>
        </tr>
      </thead>
      <tbody class="tableBody"></tbody>
    </table>

    <form method="GET" action="./index.html" class="form">
      <input type="text" name="name" placeholder="syötä nimi" required />
      <input type="number" name="age" placeholder="syötä ikä" required />
      <input type="text" name="job" placeholder="syötä työ" required />
      <select name="license" required>
        <option value="">Onko Ajokortti vai ei</option>
        <option value="Kyllä">Kyllä</option>
        <option value="Ei">Ei</option>
      </select>
      <button type="submit" class="addBtn">Add</button>
    </form>
    <script src="./script.js"></script>
  </body>
</html>
